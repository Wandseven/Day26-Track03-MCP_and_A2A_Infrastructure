<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A2A Multi-Agent System — Teaching Slides</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f172a;
    color: #f1f5f9;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── top bar ─────────────────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    flex-shrink: 0;
    gap: 12px;
  }

  #title-area { flex: 1; min-width: 0; }
  #slide-title {
    font-size: 15px;
    font-weight: 600;
    color: #f1f5f9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #slide-subtitle {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn {
    background: #334155;
    color: #cbd5e1;
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 13px;
    transition: background .15s;
  }
  .btn:hover { background: #475569; }
  .btn:disabled { opacity: .35; cursor: default; }

  #counter {
    font-size: 13px;
    color: #94a3b8;
    min-width: 52px;
    text-align: center;
  }

  #notes-toggle {
    background: #1d4ed8;
  }
  #notes-toggle:hover { background: #2563eb; }
  #notes-toggle.active { background: #7c3aed; }

  /* ── progress bar ────────────────────────────────────── */
  #progress {
    height: 3px;
    background: #1e293b;
    flex-shrink: 0;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    transition: width .3s ease;
  }

  /* ── main area ───────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── slide viewport ──────────────────────────────────── */
  #viewport {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
    position: relative;
  }

  #slide-wrapper {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide {
    display: none;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
  }
  .slide.active { display: flex; }

  .slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }

  /* ── notes panel ─────────────────────────────────────── */
  #notes-panel {
    width: 320px;
    flex-shrink: 0;
    background: #1e293b;
    border-left: 1px solid #334155;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width .2s ease;
  }
  #notes-panel.hidden { width: 0; border: none; }

  #notes-header {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: .05em;
    border-bottom: 1px solid #334155;
    flex-shrink: 0;
  }

  #notes-content {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
    color: #cbd5e1;
  }
  #notes-content h3 {
    color: #60a5fa;
    font-size: 13px;
    margin-bottom: 8px;
  }
  #notes-content ul {
    padding-left: 18px;
  }
  #notes-content li {
    margin-bottom: 6px;
  }
  #notes-content .tag {
    display: inline-block;
    background: #1d4ed8;
    color: #bfdbfe;
    border-radius: 4px;
    font-size: 10px;
    padding: 1px 6px;
    margin-bottom: 8px;
  }
  #notes-content .tag.green { background: #15803d; color: #bbf7d0; }
  #notes-content .tag.purple { background: #6d28d9; color: #ede9fe; }
  #notes-content .tag.orange { background: #c2410c; color: #fed7aa; }
  #notes-content code {
    background: #0f172a;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 11px;
    color: #a5f3fc;
  }

  /* ── thumbnails strip ────────────────────────────────── */
  #thumbs {
    height: 72px;
    background: #1e293b;
    border-top: 1px solid #334155;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .thumb {
    flex-shrink: 0;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 4px;
    overflow: hidden;
    opacity: .55;
    transition: opacity .15s, border-color .15s;
  }
  .thumb:hover { opacity: .85; }
  .thumb.active { border-color: #3b82f6; opacity: 1; }
  .thumb img { height: 52px; display: block; }

  /* ── keyboard hint ───────────────────────────────────── */
  #keyhint {
    position: fixed;
    bottom: 84px;
    right: 16px;
    background: rgba(30,41,59,.9);
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: #64748b;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
  }
  #keyhint.show { opacity: 1; }
</style>
</head>
<body>

<!-- top bar -->
<div id="topbar">
  <div id="title-area">
    <div id="slide-title">Loading…</div>
    <div id="slide-subtitle"></div>
  </div>
  <div id="controls">
    <button class="btn" id="btn-prev">◀ Prev</button>
    <span id="counter">1 / 10</span>
    <button class="btn" id="btn-next">Next ▶</button>
    <button class="btn" id="notes-toggle" onclick="toggleNotes()">📝 Notes</button>
  </div>
</div>

<!-- progress bar -->
<div id="progress"><div id="progress-fill"></div></div>

<!-- main -->
<div id="main">

  <!-- slide viewport -->
  <div id="viewport">
    <div id="slide-wrapper">

      <div class="slide active" data-index="0">
        <img src="10_llm_roadmap.svg" alt="Slide 1" />
      </div>
      <div class="slide" data-index="1">
        <img src="01_why_multiagent.svg" alt="Slide 2" />
      </div>
      <div class="slide" data-index="2">
        <img src="07_a2a_intro.svg" alt="Slide 3" />
      </div>
      <div class="slide" data-index="3">
        <img src="08_a2a_core_concepts.svg" alt="Slide 4" />
      </div>
      <div class="slide" data-index="4">
        <img src="02_a2a_vs_traditional.svg" alt="Slide 5" />
      </div>
      <div class="slide" data-index="5">
        <img src="03_a2a_protocol.svg" alt="Slide 6" />
      </div>
      <div class="slide" data-index="6">
        <img src="09_a2a_interaction_flow.svg" alt="Slide 7" />
      </div>
      <div class="slide" data-index="7">
        <img src="04_a2a_system_architecture.svg" alt="Slide 8" />
      </div>
      <div class="slide" data-index="8">
        <img src="05_law_agent_graph.svg" alt="Slide 9" />
      </div>
      <div class="slide" data-index="9">
        <img src="06_request_flow.svg" alt="Slide 10" />
      </div>

    </div>
  </div>

  <!-- notes panel -->
  <div id="notes-panel" class="hidden">
    <div id="notes-header">Speaker Notes</div>
    <div id="notes-content"></div>
  </div>

</div>

<!-- thumbnail strip -->
<div id="thumbs"></div>

<!-- keyboard hint -->
<div id="keyhint">← → arrow keys to navigate</div>

<script>
// ── slide data ──────────────────────────────────────────────────
const slides = [
  {
    file: '10_llm_roadmap.svg',
    title: 'The LLM Evolution Roadmap',
    subtitle: 'From simple API calls to autonomous distributed agent networks',
    tag: 'context-setting',
    tagColor: '',
    notes: `<h3>Teaching Goal</h3>
<p>Set the stage: everything in this course lives on this roadmap. Students should know where we start and where we're heading before any code is shown.</p>
<ul>
  <li><strong>Stage 1 — Direct LLM:</strong> stateless <code>client.chat.completions.create()</code>. Simplest possible pattern.</li>
  <li><strong>Stage 2 — RAG + Tools:</strong> plug in external knowledge and calculators. LLM gains eyes and hands.</li>
  <li><strong>Stage 3 — ReAct Agent:</strong> autonomous Think→Act→Observe loop via <code>create_react_agent</code>.</li>
  <li><strong>Stage 4 — Multi-Agent in-process:</strong> specialised agents collaborate inside one Python process via LangGraph <code>StateGraph</code>.</li>
  <li><strong>Stage 5 — Distributed A2A:</strong> each agent is an independent HTTP service. This is the full project.</li>
</ul>
<h3>Key question for students</h3>
<p>"Why not stop at Stage 3?" → specialisation, parallelism, fault isolation, and independent deployability.</p>`
  },
  {
    file: '01_why_multiagent.svg',
    title: 'Why Multi-Agent AI Systems?',
    subtitle: 'From monolithic LLMs to specialised, collaborative agents',
    tag: 'motivation',
    tagColor: 'orange',
    notes: `<h3>Core message</h3>
<p>A single LLM is a generalist. Multi-agent is a team of specialists.</p>
<ul>
  <li><strong>Context overload:</strong> one LLM must juggle contract law, tax law, compliance, and routing simultaneously → shallow results.</li>
  <li><strong>No true specialisation:</strong> a tax expert LLM can be fine-tuned or prompted more deeply than a generalist.</li>
  <li><strong>Sequential only:</strong> a single model can't process tax and compliance analysis at the same time.</li>
  <li><strong>Single point of failure:</strong> crash or rate-limit on one model = total outage.</li>
</ul>
<h3>The fix</h3>
<p>An Orchestrator routes the question; specialist agents (Law, Tax, Compliance) work in parallel; results are aggregated. Analogous to a law firm with specialised partners.</p>`
  },
  {
    file: '07_a2a_intro.svg',
    title: 'Agent2Agent (A2A) Protocol',
    subtitle: 'An open standard by Google for seamless AI agent-to-agent communication',
    tag: 'protocol intro',
    tagColor: '',
    notes: `<h3>What A2A solves</h3>
<p>Without a standard, every integration is a bespoke API contract. A2A gives agents a shared language.</p>
<ul>
  <li><strong>AgentCard:</strong> JSON identity document at <code>/.well-known/agent.json</code> — what can I do, where do you reach me?</li>
  <li><strong>Peer communication:</strong> agents act as equals, not as tools inside a parent process.</li>
  <li><strong>Stateful Tasks:</strong> long-running work is tracked across multiple message exchanges.</li>
  <li><strong>SSE streaming:</strong> partial results arrive in real-time rather than waiting for final output.</li>
  <li><strong>Framework agnostic:</strong> LangGraph, CrewAI, AutoGen — all can speak A2A.</li>
</ul>
<h3>Built on</h3>
<p>HTTP + JSON-RPC + Server-Sent Events. Nothing exotic — standard web stack.</p>`
  },
  {
    file: '08_a2a_core_concepts.svg',
    title: 'A2A Core Concepts',
    subtitle: 'AgentCard, Task, Message, Part, Artifact, Context',
    tag: 'deep dive',
    tagColor: 'purple',
    notes: `<h3>Vocabulary to drill</h3>
<ul>
  <li><strong>AgentCard:</strong> published at <code>GET /.well-known/agent.json</code>. Contains name, endpoint, skills, auth.</li>
  <li><strong>Task:</strong> the unit of work. Has an ID, status (<code>submitted → working → completed</code>), and holds messages + artifacts.</li>
  <li><strong>Message:</strong> a single turn (user or agent). Contains one or more <em>Parts</em>.</li>
  <li><strong>Part:</strong> typed payload — <code>TextPart</code>, <code>FilePart</code>, <code>DataPart</code>.</li>
  <li><strong>Artifact:</strong> a named output produced by the agent (e.g., a PDF, a JSON analysis).</li>
  <li><strong>Context:</strong> <code>context_id</code> groups related tasks across a session; <code>trace_id</code> for observability.</li>
</ul>
<h3>Analogy</h3>
<p>Think of Task as a Jira ticket, Message as a comment thread, Artifact as an attachment.</p>`
  },
  {
    file: '02_a2a_vs_traditional.svg',
    title: 'Traditional vs. A2A Multi-Agent',
    subtitle: 'From hardwired in-process agents to independently deployed services',
    tag: 'comparison',
    tagColor: 'orange',
    notes: `<h3>Traditional approach (Stage 4)</h3>
<ul>
  <li>All agents live in one Python process — <code>langgraph_app.py</code> imports <code>TaxAgent</code>, <code>LawAgent</code>, etc.</li>
  <li>Routing is hardcoded in the orchestrator's logic.</li>
  <li>Shared in-process state via TypedDict.</li>
  <li><strong>Pain:</strong> deploy one → deploy all. Scale one → scale all. One crash = all down.</li>
</ul>
<h3>A2A approach (Stage 5)</h3>
<ul>
  <li>Each agent is a standalone HTTP server, independently deployable.</li>
  <li>Discovery is dynamic: agents register with Registry on startup, clients query at runtime.</li>
  <li>Scale Tax Agent to 5 replicas without touching Law Agent.</li>
  <li>Add a new specialist agent — no code change to existing agents.</li>
</ul>`
  },
  {
    file: '03_a2a_protocol.svg',
    title: 'A2A Protocol — In This Project',
    subtitle: 'AgentCard, Task lifecycle, Message structure, and flow',
    tag: 'project-specific',
    tagColor: 'green',
    notes: `<h3>How we use A2A</h3>
<ul>
  <li><strong>AgentCard:</strong> each agent publishes its card. Customer Agent reads Law Agent's card to verify capability before delegating.</li>
  <li><strong>Task lifecycle:</strong> <code>submitted → working → completed</code>. Law Agent holds a Task open while it waits for Tax + Compliance sub-tasks.</li>
  <li><strong>Message structure:</strong> <code>role: "user"</code> with <code>TextPart</code> for the question; <code>role: "agent"</code> with <code>TextPart</code> for the answer.</li>
  <li><strong>EventQueue:</strong> Law Agent streams partial results back; Customer Agent re-streams to the client.</li>
</ul>
<h3>Key file</h3>
<p><code>common/a2a_client.py</code> — the <code>delegate()</code> function wraps all A2A message construction and sending.</p>`
  },
  {
    file: '09_a2a_interaction_flow.svg',
    title: 'A2A Interaction & Task Lifecycle Flow',
    subtitle: 'Discover → Authenticate → Delegate → Stream/Poll → Receive',
    tag: 'protocol flow',
    tagColor: 'purple',
    notes: `<h3>Step-by-step walkthrough</h3>
<ul>
  <li><strong>Phase 1 — Discovery:</strong> Client queries Registry → gets agent endpoint URL + AgentCard.</li>
  <li><strong>Phase 2 — Authentication:</strong> Client presents credentials declared in AgentCard (API key, OAuth, etc.). Our project uses a simple bearer token.</li>
  <li><strong>Phase 3 — Task creation:</strong> <code>POST /tasks</code> with the question as a <code>TextPart</code> message.</li>
  <li><strong>Phase 4 — Streaming:</strong> Server-Sent Events stream <code>TaskStatusUpdateEvent</code> and <code>TaskArtifactUpdateEvent</code> as work progresses.</li>
  <li><strong>Phase 5 — Completion:</strong> Final <code>Task</code> object returned; client reads <code>artifacts</code>.</li>
</ul>
<h3>Alternative: polling</h3>
<p>If SSE isn't available, clients can <code>GET /tasks/{id}</code> to poll status. Both patterns are in the SDK.</p>`
  },
  {
    file: '04_a2a_system_architecture.svg',
    title: 'Legal Multi-Agent System — Architecture',
    subtitle: '5 services · A2A protocol · LangGraph · OpenRouter LLM',
    tag: 'our system',
    tagColor: 'green',
    notes: `<h3>Service map</h3>
<ul>
  <li><strong>Registry :10000</strong> — FastAPI, in-memory. <code>POST /register</code> on startup, <code>GET /discover/{task}</code> at runtime.</li>
  <li><strong>Customer Agent :10100</strong> — <code>create_react_agent</code>. Single tool: <code>delegate_to_legal_agent()</code>.</li>
  <li><strong>Law Agent :10101</strong> — custom <code>StateGraph</code>. Orchestrates Tax + Compliance in parallel.</li>
  <li><strong>Tax Agent :10102</strong> — <code>create_react_agent</code>. IRS, penalties, FBAR/FATCA specialist.</li>
  <li><strong>Compliance Agent :10103</strong> — <code>create_react_agent</code>. SEC, SOX, FCPA, GDPR, AML specialist.</li>
</ul>
<h3>LLM provider</h3>
<p>All agents call OpenRouter (<code>common/llm.py</code> → <code>get_llm()</code>). Swap the model string in <code>.env</code> to change models system-wide.</p>`
  },
  {
    file: '05_law_agent_graph.svg',
    title: 'Law Agent — LangGraph StateGraph Deep Dive',
    subtitle: 'Parallel delegation via Send API · State merging · Depth guards',
    tag: 'implementation',
    tagColor: 'purple',
    notes: `<h3>Graph nodes</h3>
<ul>
  <li><code>analyze_law</code> — LLM provides general legal analysis.</li>
  <li><code>check_routing</code> — LLM outputs JSON: <code>{"needs_tax": true, "needs_compliance": true}</code>.</li>
  <li><code>route_to_subagents</code> — returns <code>[Send("call_tax"), Send("call_compliance")]</code> to trigger parallel branches.</li>
  <li><code>call_tax</code> / <code>call_compliance</code> — each calls <code>delegate()</code> via A2A.</li>
  <li><code>aggregate</code> — combines all analyses into the final response.</li>
</ul>
<h3>Key patterns</h3>
<ul>
  <li><strong>Send API:</strong> LangGraph's way to fan-out work to parallel graph branches.</li>
  <li><strong>Annotated reducers:</strong> <code>Annotated[str, _last_wins]</code> handles concurrent writes to shared state fields.</li>
  <li><strong>Depth guard:</strong> <code>MAX_DELEGATION_DEPTH = 3</code> stops infinite agent recursion.</li>
</ul>`
  },
  {
    file: '06_request_flow.svg',
    title: 'End-to-End Request Flow with Trace Propagation',
    subtitle: 'Query: "If a company breaks a contract and evades taxes…"',
    tag: 'e2e trace',
    tagColor: 'green',
    notes: `<h3>The full journey</h3>
<ul>
  <li><strong>①</strong> User sends question to Customer Agent via A2A.</li>
  <li><strong>②</strong> Customer Agent LLM detects legal domain → calls <code>delegate_to_legal_agent()</code> tool.</li>
  <li><strong>③</strong> Registry returns Law Agent endpoint (<code>http://localhost:10101</code>).</li>
  <li><strong>④</strong> Customer Agent sends A2A message to Law Agent. <code>trace_id</code> generated here.</li>
  <li><strong>⑤</strong> Law Agent runs StateGraph: analyze → check_routing → parallel Tax + Compliance calls.</li>
  <li><strong>⑥ ⑦</strong> Tax Agent and Compliance Agent each call OpenRouter LLM independently.</li>
  <li><strong>⑧</strong> Law Agent aggregates all results, streams back to Customer Agent.</li>
  <li><strong>⑨</strong> Customer Agent returns final response to user.</li>
</ul>
<h3>Observability</h3>
<p><code>trace_id</code> propagated to every hop — use it to correlate logs across all 5 services.</p>`
  }
];

// ── state ───────────────────────────────────────────────────────
let current = 0;
let notesOpen = false;

// ── build thumbnails ────────────────────────────────────────────
const thumbsEl = document.getElementById('thumbs');
slides.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'thumb' + (i === 0 ? ' active' : '');
  el.innerHTML = `<img src="${s.file}" alt="slide ${i+1}" />`;
  el.addEventListener('click', () => goTo(i));
  thumbsEl.appendChild(el);
});

// ── navigation ──────────────────────────────────────────────────
function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;

  document.querySelectorAll('.slide')[current].classList.remove('active');
  document.querySelectorAll('.thumb')[current].classList.remove('active');

  current = idx;

  document.querySelectorAll('.slide')[current].classList.add('active');
  document.querySelectorAll('.thumb')[current].classList.add('active');
  document.querySelectorAll('.thumb')[current].scrollIntoView({ inline: 'nearest', block: 'nearest' });

  updateUI();
}

function updateUI() {
  const s = slides[current];
  document.getElementById('slide-title').textContent = s.title;
  document.getElementById('slide-subtitle').textContent = s.subtitle;
  document.getElementById('counter').textContent = `${current + 1} / ${slides.length}`;
  document.getElementById('progress-fill').style.width = `${((current + 1) / slides.length) * 100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === slides.length - 1;

  const nc = document.getElementById('notes-content');
  nc.innerHTML = `<span class="tag ${s.tagColor}">${s.tag}</span>` + s.notes;
}

document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(current - 1); }
  if (e.key === 'n' || e.key === 'N') toggleNotes();
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End') goTo(slides.length - 1);
});

// ── notes panel ─────────────────────────────────────────────────
function toggleNotes() {
  notesOpen = !notesOpen;
  const panel = document.getElementById('notes-panel');
  const btn = document.getElementById('notes-toggle');
  panel.classList.toggle('hidden', !notesOpen);
  btn.classList.toggle('active', notesOpen);
}

// ── keyboard hint ────────────────────────────────────────────────
const hint = document.getElementById('keyhint');
setTimeout(() => { hint.classList.add('show'); }, 600);
setTimeout(() => { hint.classList.remove('show'); }, 4000);

// ── init ─────────────────────────────────────────────────────────
updateUI();
</script>
</body>
</html>
